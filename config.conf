# ══════════════════════════════════════════════════════════════
#  CORTEX RAM GUARD v3 — Configuration
#  Edit this file to tune behavior. Changes picked up on next cycle.
# ══════════════════════════════════════════════════════════════

# --- Pressure thresholds (multiplier × RAM_GB in MB) ---
# Example: 18GB RAM → YELLOW at 9000MB, ORANGE at 14400MB, RED at 21600MB
YELLOW_MULT=500
ORANGE_MULT=800
RED_MULT=1200

# --- Process limits (max count before culling oldest) ---
MAX_COMET_PROCS=20
MAX_NODE_PROCS=80
MAX_RENDERER_PROCS=12

# --- CPU kill thresholds (% above which hot procs get killed) ---
CPU_KILL_PYTHON=60
CPU_KILL_NODE=70
CPU_KILL_RENDERER=50

# --- Per-app RSS budgets (MB) — kill oldest procs when group exceeds budget ---
# Set to 0 to disable budget enforcement for that group
BUDGET_COMET_MB=1500
BUDGET_NODE_MB=2000
BUDGET_RENDERER_MB=1800
BUDGET_PYTHON_MB=1200

# --- Timing (seconds) ---
INTERVAL_GREEN=120
INTERVAL_YELLOW=60
INTERVAL_ORANGE=30
INTERVAL_RED=15
COOLDOWN_SECONDS=180

# --- Trend / Leak detection ---
TREND_WINDOW=10
TREND_TOLERANCE_MB=100

# --- Stale renderer age threshold (minutes) ---
STALE_RENDERER_MIN=90

# --- Predictive alert: warn when projected time to RED < N minutes ---
PREDICT_ALERT_MIN=15

# --- Self-health: max RSS for guard daemon itself (MB) ---
SELF_MAX_RSS_MB=50

# --- Log retention ---
LOG_COMPRESS_DAYS=3
LOG_DELETE_DAYS=14

# --- Notifications ---
NOTIFY_ENABLED=1
NOTIFY_BATCH_SECONDS=120

# --- Whitelist patterns (one per line, matched against full command) ---
# Lines starting with # are ignored
WHITELIST_FILE=~/.cortex/ram-guard/whitelist.conf
